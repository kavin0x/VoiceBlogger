name: Promote main to production

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy latest main commit to production
        run: |
          git fetch origin main
          git push origin "refs/remotes/origin/main:refs/heads/production" --force
